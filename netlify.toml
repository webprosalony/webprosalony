[build]
  publish = "."

# Starý odkaz po odeslání formuláře → nová cesta (obsah je thank-you/index.html)
[[redirects]]
  from = "/thank-you.html"
  to = "/thank-you/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
