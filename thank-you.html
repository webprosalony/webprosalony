<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Děkujeme — WEB pro Salony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .thanks { min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .thanks h1 { font-family: var(--font-serif); color: var(--accent); font-size: clamp(1.75rem, 4vw, 2.5rem); margin: 0 0 1rem; }
    .thanks p { color: var(--text-muted); max-width: 32ch; margin: 0 auto 1.5rem; }
  </style>
</head>
<body>
  <main class="thanks">
    <div>
      <h1>Děkujeme za vaši poptávku</h1>
      <p>Ozveme se vám co nejdříve na uvedené telefonní číslo. Těšíme se na spolupráci.</p>
      <a class="btn btn--primary" href="/">Zpět na úvod</a>
    </div>
  </main>
</body>
</html>
